## orchard.rotko.net
##
## Static site for the orchard-simulator. nginx vhost that serves the
## artifact from /var/www/orchard-rotko-net/ with the headers
## SharedArrayBuffer needs for the parallel-WASM rayon path.
##
## Drop into /etc/nginx/sites-available/orchard.rotko.net.conf and
## symlink under sites-enabled. If haproxy sits in front of nginx,
## the cert + SNI termination stays on haproxy; this block is the
## origin behind it. If nginx terminates TLS directly, uncomment the
## ssl_certificate lines below and remove `listen 80`.

server {
    listen 80;
    listen [::]:80;
    server_name orchard.rotko.net;

    # Uncomment if nginx terminates TLS:
    # listen 443 ssl http2;
    # listen [::]:443 ssl http2;
    # ssl_certificate     /etc/letsencrypt/live/orchard.rotko.net/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/orchard.rotko.net/privkey.pem;

    root /var/www/orchard-rotko-net;
    index index.html;

    # Cross-origin isolation. Enables SharedArrayBuffer in the browser
    # so the parallel WASM build's rayon thread pool can spin up. Pure
    # browser-security metadata; compute remains 100% client-side.
    add_header Cross-Origin-Opener-Policy  "same-origin"  always;
    add_header Cross-Origin-Embedder-Policy "require-corp" always;

    # Conservative CSP. Allows wasm and module workers from same
    # origin; nothing third-party.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'wasm-unsafe-eval'; worker-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;

    # Standard hardening.
    add_header X-Content-Type-Options "nosniff"   always;
    add_header X-Frame-Options        "DENY"      always;
    add_header Referrer-Policy        "no-referrer" always;
    add_header Permissions-Policy     "interest-cohort=()" always;

    # MIME types nginx ships sometimes miss WASM. Make sure it's right
    # so the browser can streaming-instantiate.
    types {
        application/wasm wasm;
    }

    # The WASM blobs and JS bindings hash-in-name (wasm-bindgen output
    # is content-addressed) so we can cache aggressively. HTML and the
    # entry-point JS that may change between deploys gets no-cache.
    location ~* \.(wasm|wasm\.gz|wasm\.br)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        add_header Cross-Origin-Opener-Policy  "same-origin"  always;
        add_header Cross-Origin-Embedder-Policy "require-corp" always;
        add_header Cross-Origin-Resource-Policy "same-origin" always;
    }

    location /pkg/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        add_header Cross-Origin-Opener-Policy  "same-origin"  always;
        add_header Cross-Origin-Embedder-Policy "require-corp" always;
        add_header Cross-Origin-Resource-Policy "same-origin" always;
    }

    location /pkg-parallel/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        add_header Cross-Origin-Opener-Policy  "same-origin"  always;
        add_header Cross-Origin-Embedder-Policy "require-corp" always;
        add_header Cross-Origin-Resource-Policy "same-origin" always;
    }

    # HTML / top-level JS: no-cache so deploys take effect immediately.
    location ~* \.(html|js)$ {
        expires -1;
        add_header Cache-Control "no-cache, must-revalidate";
        add_header Cross-Origin-Opener-Policy  "same-origin"  always;
        add_header Cross-Origin-Embedder-Policy "require-corp" always;
    }

    # Don't leak dotfiles (.deploy-sha256 etc).
    location ~ /\. {
        deny all;
    }
}
