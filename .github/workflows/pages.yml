name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping queued runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-wasm:
    name: Build WASM (single-threaded + parallel)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable + wasm32 target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install Rust nightly + rust-src (for parallel build-std)
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: wasm32-unknown-unknown
          components: rust-src

      - name: Cache cargo + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-pages-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}

      - name: Install wasm-bindgen-cli
        run: cargo install wasm-bindgen-cli --version 0.2.114 --locked

      - name: Build single-threaded WASM
        env:
          PROFILE: release
          FEATURES: wasm-orchard
        run: bash build-wasm.sh

      - name: Build parallel WASM (rayon + atomics)
        run: bash build-wasm-parallel.sh

      - name: Stage deploy directory
        run: |
          mkdir -p deploy
          # Copy the entire web/ tree (HTML, CSS, JS, both pkg dirs are
          # already inside via build steps above).
          cp -r web/* deploy/
          ls -la deploy/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: deploy

  deploy:
    name: Deploy
    needs: build-wasm
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
