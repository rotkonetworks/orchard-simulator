name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: short
  # Warning denial is configured in `[lints.rust]` of Cargo.toml so it
  # applies only to this crate. Setting `RUSTFLAGS=-D warnings` here
  # would also fail on upstream-crate deprecations (e.g. the vendored
  # `core2 0.3.3`) which we cannot fix.

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-clippy-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}
      - run: cargo clippy --features orchard --all-targets -- -D warnings
      - run: cargo clippy --no-default-features --all-targets -- -D warnings

  test-halo2:
    name: Test (halo2)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-halo2-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}
      - run: cargo test --features halo2 --verbose

  test-orchard:
    name: Test (orchard)
    runs-on: ubuntu-latest
    # The slow #[ignore]-gated tests run the production Orchard prover
    # end to end. ~2.5 min locally; CI can budget ~10 min.
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-orchard-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}
      - name: Fast lib tests
        run: cargo test --features orchard --lib --verbose
      - name: Slow Orchard tests
        run: cargo test --features orchard --lib -- --ignored

  build-wasm:
    name: Build (wasm32, wasm-orchard)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-wasm-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}
      - run: cargo build --target wasm32-unknown-unknown --features wasm-orchard --no-default-features --release --lib
